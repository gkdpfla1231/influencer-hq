<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Influencer HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--surface3:#222;--border:#2a2a2a;--gold:#c4a265;--gold-dim:#8a7345;--gold-glow:rgba(196,162,101,.12);--text:#e8e8e8;--text2:#999;--text3:#666;--white:#fff;--danger:#c44;--success:#4a7;--warn:#ca4}
html,body{height:100%;font-family:'SF Pro Display',-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text)}
input,textarea,select{font-family:inherit;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;outline:none;transition:border .2s}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
textarea{resize:vertical}
select option{background:var(--surface2)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.app{display:flex;flex-direction:column;height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo{font-size:18px;font-weight:700;letter-spacing:2px;color:var(--white)}
.logo span{color:var(--gold)}
.header-right{font-size:12px;color:var(--text3);letter-spacing:1px}

.nav{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto}
.nav-btn{padding:12px 20px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);transition:all .2s;border-bottom:2px solid transparent;white-space:nowrap}
.nav-btn:hover{color:var(--text2)}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

.main{flex:1;overflow-y:auto;padding:24px 28px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.btn{padding:8px 18px;border-radius:6px;font-size:12px;letter-spacing:1px;transition:all .2s}
.btn-gold{background:var(--gold);color:#000;font-weight:600}
.btn-gold:hover{background:#d4b275}
.btn-outline{border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-danger{border:1px solid var(--danger);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;letter-spacing:.5px;font-weight:600;text-transform:uppercase}
.badge-gold{background:var(--gold-glow);color:var(--gold);border:1px solid var(--gold-dim)}
.badge-success{background:rgba(68,170,119,.12);color:var(--success);border:1px solid rgba(68,170,119,.3)}
.badge-warn{background:rgba(204,170,68,.12);color:var(--warn);border:1px solid rgba(204,170,68,.3)}
.badge-danger{background:rgba(204,68,68,.12);color:var(--danger);border:1px solid rgba(204,68,68,.3)}
.badge-neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

.empty{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;letter-spacing:1px}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.5}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:14px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:20px;color:var(--gold)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

.tag{display:inline-block;padding:2px 8px;margin:2px;border-radius:4px;font-size:11px;background:var(--surface3);color:var(--text2)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-size:16px;font-weight:600;letter-spacing:1px}
.section-sub{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* Calendar */
.cal-controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.cal-controls .month-label{font-size:16px;font-weight:600;min-width:180px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:8px;overflow:hidden}
.cal-head{padding:10px 4px;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);background:var(--surface)}
.cal-cell{min-height:90px;padding:6px;background:var(--surface);position:relative;cursor:pointer;transition:background .15s}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.other{opacity:.3}
.cal-cell.today{background:var(--gold-glow)}
.cal-day{font-size:12px;font-weight:600;margin-bottom:4px}
.cal-event{font-size:9px;padding:2px 5px;margin-bottom:2px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-event.acct-0{background:rgba(196,162,101,.2);color:var(--gold);border-left:2px solid var(--gold)}
.cal-event.acct-1{background:rgba(150,180,220,.2);color:#96b4dc;border-left:2px solid #96b4dc}
.week-view .cal-cell{min-height:140px}

/* Carousel */
.carousel-workspace{display:flex;gap:20px;height:calc(100vh - 180px)}
.carousel-sidebar{width:200px;flex-shrink:0;overflow-y:auto}
.slide-thumb{padding:10px;border:1px solid var(--border);border-radius:6px;margin-bottom:8px;cursor:pointer;transition:all .2s;font-size:11px;color:var(--text2)}
.slide-thumb:hover,.slide-thumb.active{border-color:var(--gold);background:var(--gold-glow)}
.slide-thumb .num{font-size:10px;color:var(--text3);margin-bottom:4px}
.carousel-preview{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.slide-canvas{width:400px;height:500px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;position:relative;overflow:hidden;background-size:cover;background-position:center}
.slide-canvas .slide-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.slide-canvas .slide-heading{font-size:22px;font-weight:700;text-align:center;margin-bottom:12px;color:var(--white);word-break:keep-all;position:relative;z-index:2}
.slide-canvas .slide-body{font-size:14px;text-align:center;color:var(--text2);line-height:1.6;word-break:keep-all;position:relative;z-index:2}
.slide-canvas .slide-media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px}
.slide-canvas .slide-media-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px}
.slide-canvas .slide-num{position:absolute;bottom:12px;right:16px;font-size:10px;color:var(--text3);z-index:2}
.carousel-editor{width:300px;flex-shrink:0;overflow-y:auto}

/* Canva-style toolbar */
.canva-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;padding:8px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)}
.canva-toolbar button{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:4px;background:var(--surface3);color:var(--text2)}
.canva-toolbar button:hover{border-color:var(--gold);color:var(--gold)}
.canva-toolbar button.active{background:var(--gold);color:#000;border-color:var(--gold)}
.font-select{background:var(--surface3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:11px}

/* File upload zone */
.file-drop{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;font-size:12px;color:var(--text3)}
.file-drop:hover{border-color:var(--gold);color:var(--gold)}
.file-drop.has-file{border-color:var(--success);color:var(--success)}

/* AI Caption */
.ai-output{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;min-height:120px;white-space:pre-wrap;line-height:1.7;font-size:13px}
.ai-output .hashtags{color:var(--gold);margin-top:8px;display:block}

/* Deals */
.deal-row{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap}
.deal-row:last-child{border-bottom:none}
.deal-brand{font-weight:600;min-width:140px}
.deal-value{color:var(--gold);font-weight:600;min-width:100px}
.deal-deadline{color:var(--text2);font-size:12px;min-width:100px}
.deal-actions{margin-left:auto;display:flex;gap:6px}
.deal-files{display:flex;gap:6px;margin-top:4px;width:100%}
.deal-file-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:4px;font-size:10px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);cursor:pointer}
.deal-file-badge:hover{border-color:var(--gold);color:var(--gold)}

/* Script */
.script-block{border-left:3px solid var(--gold);padding:12px 16px;margin-bottom:12px;background:var(--surface2);border-radius:0 8px 8px 0}
.script-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.script-text{font-size:13px;line-height:1.7;color:var(--text)}
.screenshot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:10px}
.screenshot-item{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--border);aspect-ratio:9/16;background:var(--surface2)}
.screenshot-item img{width:100%;height:100%;object-fit:cover}
.screenshot-item .remove-ss{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.7);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border)}

/* CRM */
.crm-card{border:1px solid var(--border);border-radius:8px;padding:16px;background:var(--surface);transition:border .2s}
.crm-card:hover{border-color:var(--gold-dim)}
.crm-card h3{font-size:14px;font-weight:600;margin-bottom:6px}
.crm-card .crm-contact{font-size:12px;color:var(--text2);margin-bottom:8px}
.crm-card .crm-notes{font-size:12px;color:var(--text3);line-height:1.5;margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.crm-card .crm-category{font-size:10px;color:var(--gold);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.crm-actions{display:flex;gap:6px;margin-top:10px}
.crm-filter{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.crm-filter button{padding:4px 12px;font-size:11px;border:1px solid var(--border);border-radius:20px;color:var(--text3)}
.crm-filter button:hover,.crm-filter button.active{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}

/* Gmail integration */
.gmail-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:16px;font-size:12px}
.gmail-bar .gmail-icon{font-size:16px}
.gmail-bar .gmail-email{color:var(--gold);font-weight:600;letter-spacing:.5px}
.gmail-bar .gmail-status{color:var(--success);font-size:10px;margin-left:auto;letter-spacing:1px}
.btn-gmail{background:rgba(196,162,101,.12);border:1px solid var(--gold-dim);color:var(--gold);padding:4px 10px;border-radius:4px;font-size:10px;letter-spacing:.5px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn-gmail:hover{background:var(--gold);color:#000}
.email-log{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.email-log-item{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text3);padding:3px 0}
.email-log-item .log-date{color:var(--text2);min-width:70px}
.email-log-item .log-type{padding:1px 6px;border-radius:3px;font-size:9px;letter-spacing:.5px}
.email-log-item .log-sent{background:rgba(68,170,119,.15);color:var(--success)}
.email-log-item .log-reply{background:rgba(196,162,101,.15);color:var(--gold)}
.email-log-item .log-follow{background:rgba(204,170,68,.15);color:var(--warn)}
.email-tpl-select{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.email-tpl-select button{padding:4px 10px;font-size:10px;border:1px solid var(--border);border-radius:4px;color:var(--text3);background:var(--surface2)}
.email-tpl-select button:hover{border-color:var(--gold);color:var(--gold)}

/* Email Parser */
.email-import-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:16px;position:relative}
.email-import-zone:hover,.email-import-zone.drag-over{border-color:var(--gold);background:var(--gold-glow)}
.email-import-zone .import-icon{font-size:28px;margin-bottom:8px;opacity:.6}
.email-import-zone .import-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.email-import-zone .import-sub{font-size:11px;color:var(--text3)}
.parsed-result{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.parsed-field{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.parsed-field:last-child{border-bottom:none}
.parsed-label{min-width:80px;font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;padding-top:2px;flex-shrink:0}
.parsed-value{color:var(--text);line-height:1.5;flex:1}
.parsed-value.editable{background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:4px 8px;cursor:text}
.parsed-tag{display:inline-block;padding:2px 8px;margin:2px;border-radius:4px;font-size:10px;background:var(--gold-glow);color:var(--gold);border:1px solid var(--gold-dim)}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dash-stat{text-align:center;padding:16px}
.dash-stat-num{font-size:28px;font-weight:700;color:var(--gold)}
.dash-stat-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.dash-alert{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;margin-bottom:8px;font-size:12px;border:1px solid}
.dash-alert.urgent{background:rgba(204,68,68,.08);border-color:rgba(204,68,68,.3);color:var(--danger)}
.dash-alert.warning{background:rgba(204,170,68,.08);border-color:rgba(204,170,68,.3);color:var(--warn)}
.dash-alert.info{background:var(--gold-glow);border-color:var(--gold-dim);color:var(--gold)}
.dash-alert .alert-icon{font-size:16px}
.dash-timeline{position:relative;padding-left:20px}
.dash-timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border)}
.dash-tl-item{position:relative;padding:8px 0 8px 16px;font-size:12px;color:var(--text2)}
.dash-tl-item::before{content:'';position:absolute;left:-17px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
.dash-tl-item .tl-date{font-size:10px;color:var(--text3)}
.weekly-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.weekly-row:last-child{border-bottom:none}
.weekly-day{min-width:30px;font-weight:700;color:var(--gold)}
.batch-check{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
.price-calc{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;font-size:12px}
.price-calc label{color:var(--text2)}
.price-calc input{width:100px;font-size:12px;padding:4px 8px;text-align:right}
.price-calc .rate-val{color:var(--gold);font-weight:600;min-width:80px;text-align:right}

.hidden{display:none!important}
.gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:20px 0}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tab-content{animation:fadeIn .25s ease}

/* Thumbnail Maker */
.thumb-workspace{display:flex;gap:20px;height:calc(100vh - 180px)}
.thumb-preview{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.thumb-canvas-wrap{position:relative;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.thumb-canvas{display:block;touch-action:none;user-select:none}
.thumb-editor{width:320px;flex-shrink:0;overflow-y:auto;padding-right:4px}
.thumb-templates{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.thumb-tpl{aspect-ratio:16/9;border:2px solid var(--border);border-radius:6px;cursor:pointer;overflow:hidden;position:relative;transition:all .2s;display:flex;align-items:center;justify-content:center;padding:6px;font-size:8px;text-align:center;color:var(--text3);background:var(--surface2)}
.thumb-tpl:hover,.thumb-tpl.active{border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow)}
.thumb-tpl-label{position:absolute;bottom:2px;left:0;right:0;font-size:7px;text-align:center;color:var(--text3)}
.thumb-saved-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
.thumb-saved-item{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:border .2s}
.thumb-saved-item:hover{border-color:var(--gold)}
.thumb-saved-item img{width:100%;display:block}
.thumb-saved-item .thumb-saved-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.8);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border)}
.thumb-saved-item .thumb-saved-name{position:absolute;bottom:0;left:0;right:0;padding:4px 8px;background:rgba(0,0,0,.7);font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.color-swatches{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.color-swatch{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border .15s}
.color-swatch:hover,.color-swatch.active{border-color:var(--white)}
.thumb-layer-list{margin-top:10px}
.thumb-layer{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--border);border-radius:4px;margin-bottom:4px;font-size:11px;color:var(--text2);background:var(--surface2)}
.thumb-layer .layer-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.thumb-layer button{font-size:10px;color:var(--text3);padding:2px 6px}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">INFLUENCER <span>HQ</span></div>
    <div class="header-right">SEOUL &middot; @krystalha_ &middot; @_from.krystal</div>
  </header>
  <nav class="nav" id="nav"></nav>
  <main class="main" id="main"></main>
</div>

<script>
// ─── State ───
const S = {
  tab: 'dashboard',
  calView: 'month',
  calDate: new Date(),
  posts: JSON.parse(localStorage.getItem('ihq_posts') || '[]'),
  slides: JSON.parse(localStorage.getItem('ihq_slides') || '[]'),
  activeSlide: 0,
  deals: JSON.parse(localStorage.getItem('ihq_deals') || '[]'),
  contacts: JSON.parse(localStorage.getItem('ihq_contacts') || '[]'),
  scripts: JSON.parse(localStorage.getItem('ihq_scripts') || '[]'),
  crmFilter: 'all',
  crmSelected: [],
  weeklyTemplates: JSON.parse(localStorage.getItem('ihq_weekly') || 'null') || [
    { day: 1, title: '전시 리뷰', account: 0 },
    { day: 3, title: '카페/공간 추천', account: 1 },
    { day: 5, title: 'OOTD / 패션', account: 0 },
  ],
  priceRates: JSON.parse(localStorage.getItem('ihq_rates') || 'null') || {
    feed: 500000, reels: 800000, story: 200000, youtube: 2000000, shorts: 1000000, blog: 400000,
  },
  thumbs: JSON.parse(localStorage.getItem('ihq_thumbs') || '[]'),
  thumb: {
    size: 'igstory',
    bg: '#1a1a1a',
    bgImage: null,

}

// ─── Dashboard ───
function renderDashboard() {
  const today = new Date();
  const todayStr = fmt(today);

  // Deadline alerts
  const alerts = [];
  S.deals.filter(d => d.status !== 'completed' && d.deadline).forEach(d => {
    const dl = new Date(d.deadline);
    const diff = Math.ceil((dl - today) / 86400000);
    if (diff < 0) alerts.push({ type: 'urgent', icon: '🔴', text: `${d.brand} — 마감일 ${Math.abs(diff)}일 초과!`, brand: d.brand });
    else if (diff === 0) alerts.push({ type: 'urgent', icon: '🔴', text: `${d.brand} — 오늘 마감!`, brand: d.brand });
    else if (diff <= 3) alerts.push({ type: 'warning', icon: '🟡', text: `${d.brand} — D-${diff} 마감 임박`, brand: d.brand });
    else if (diff <= 7) alerts.push({ type: 'info', icon: '🟢', text: `${d.brand} — D-${diff}`, brand: d.brand });
  });

  // Follow-up needed (CRM contacts with email sent but no follow-up in 5+ days)
  const emailLogs = JSON.parse(localStorage.getItem('ihq_email_logs') || '[]');
  S.contacts.filter(c => c.status === 'contacted' || c.status === 'outreach').forEach(c => {
    const logs = emailLogs.filter(l => l.brand === c.brand);
    if (logs.length > 0) {
      const lastDate = new Date(logs[0].date);
      const daysSince = Math.ceil((today - lastDate) / 86400000);
      if (daysSince >= 5) alerts.push({ type: 'info', icon: '📧', text: `${c.brand} — ${daysSince}일 전 이메일 발송, 팔로업 필요`, brand: c.brand });
    }
  });

  // No-email outreach contacts
  const noEmailCount = S.contacts.filter(c => c.status === 'outreach' && !emailLogs.find(l => l.brand === c.brand)).length;

  // Stats
  const thisMonthDeals = S.deals.filter(d => d.deadline && d.deadline.startsWith(today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0')));
  const totalRevenue = S.deals.filter(d => d.status === 'confirmed' || d.status === 'completed').reduce((s,d) => s + (parseFloat(d.value)||0), 0);
  const thisWeekPosts = S.posts.filter(p => {
    const pd = new Date(p.date);
    const diff = Math.ceil((pd - today) / 86400000);
    return diff >= 0 && diff < 7;
  });
  const activeDealCount = S.deals.filter(d => d.status !== 'completed').length;

  // Timeline (recent activity)
  const timeline = [];
  S.posts.filter(p => { const d = new Date(p.date); return Math.abs((d-today)/86400000) < 14; })
    .forEach(p => timeline.push({ date: p.date, text: `📅 ${p.title} (${ACCOUNTS[p.account]})`, type: 'post' }));
  emailLogs.slice(0, 8).forEach(l => timeline.push({ date: l.date, text: `📧 ${l.brand} — ${getEmailLogLabel(l.type)}`, type: 'email' }));
  S.deals.slice(-5).forEach(d => timeline.push({ date: d.deadline || todayStr, text: `💰 ${d.brand} — ₩${formatNum(d.value)}`, type: 'deal' }));
  timeline.sort((a, b) => b.date.localeCompare(a.date));

  // Weekly template
  const dayNames = ['일','월','화','수','목','금','토'];
  const weeklyHTML = S.weeklyTemplates.map((wt, i) =>
    `<div class="weekly-row">
      <div class="weekly-day">${dayNames[wt.day]}</div>
      <div style="flex:1">${esc(wt.title)}</div>
      <div style="font-size:10px;color:var(--text3)">${ACCOUNTS[wt.account]}</div>
      <button class="btn btn-outline btn-sm" style="padding:2px 8px;font-size:10px" onclick="removeWeekly(${i})">✕</button>
    </div>`
  ).join('') || '<div style="font-size:12px;color:var(--text3)">템플릿이 없습니다</div>';

  return `
    <div class="section-header">
      <div><div class="section-title">대시보드</div><div class="section-sub">${today.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' })}</div></div>
    </div>

    <!-- Stats -->
    <div class="grid-3" style="margin-bottom:16px;grid-template-columns:repeat(5,1fr)">
      <div class="card dash-stat"><div class="dash-stat-num">${thisWeekPosts.length}</div><div class="dash-stat-label">이번 주 포스트</div></div>
      <div class="card dash-stat"><div class="dash-stat-num">${activeDealCount}</div><div class="dash-stat-label">진행 중 딜</div></div>
      <div class="card dash-stat"><div class="dash-stat-num" style="color:var(--success)">₩${formatNum(totalRevenue)}</div><div class="dash-stat-label">확정 수익</div></div>
      <div class="card dash-stat"><div class="dash-stat-num">${emailLogs.length}</div><div class="dash-stat-label">발송 이메일</div></div>
      <div class="card dash-stat"><div class="dash-stat-num">${S.contacts.length}</div><div class="dash-stat-label">CRM 브랜드</div></div>
    </div>

    <div class="dash-grid">
      <!-- Left column -->
      <div>
        <!-- Alerts -->
        <div class="card">

function calcPrice() {
  const types = ['feed','reels','story','youtube','shorts','blog'];
  let total = 0;
  types.forEach(t => {
    const qty = parseInt(document.getElementById('pc-' + t)?.value) || 0;
    const val = qty * S.priceRates[t];
    total += val;
    const el = document.getElementById('pv-' + t);
    if (el) el.textContent = '₩' + formatNum(val);
  });
  const el = document.getElementById('pc-total');
  if (el) el.textContent = '₩' + formatNum(total);
}

// Weekly auto-fill
function autoFillWeek() {
  const today = new Date();
  const dow = today.getDay();
  let added = 0;
  S.weeklyTemplates.forEach(wt => {
    let diff = wt.day - dow;
    if (diff < 0) diff += 7;
    const d = new Date(today);
    d.setDate(today.getDate() + diff);
    const dateStr = fmt(d);
    const exists = S.posts.find(p => p.date === dateStr && p.title === wt.title);
    if (!exists) {
      S.posts.push({ id: 'p' + Date.now() + added, date: dateStr, account: wt.account, title: wt.title, note: '주간 루틴 자동 생성' });
      added++;
    }
  });
  save('posts', S.posts);
  showModal(`<div class="modal-title">주간 자동 채우기</div><p style="color:var(--text2);font-size:13px">${added}개의 포스트가 이번 주 캘린더에 추가되었습니다.</p><div class="modal-actions"><button class="btn btn-gold" onclick="closeModal()">확인</button></div>`);
}

// ─── Calendar ───
function renderCalendar() {
  const d = S.calDate;
  const y = d.getFullYear(), mo = d.getMonth();
  const first = new Date(y, mo, 1);
  const startDay = first.getDay();
  const daysInMonth = new Date(y, mo + 1, 0).getDate();
  const today = new Date();
  const isWeek = S.calView === 'week';

  let controls = `<div class="cal-controls">
    <button class="btn btn-outline btn-sm" onclick="calNav(-1)">&larr; 이전</button>
    <div class="month-label">${MONTHS[mo]} ${y}</div>
    <button class="btn btn-outline btn-sm" onclick="calNav(1)">다음 &rarr;</button>
    <button class="btn btn-outline btn-sm ${S.calView==='month'?'btn-gold':''}" onclick="S.calView='month';renderMain()">월간</button>
    <button class="btn btn-outline btn-sm ${S.calView==='week'?'btn-gold':''}" onclick="S.calView='week';renderMain()">주간</button>
    <button class="btn btn-gold btn-sm" onclick="openPostModal()">+ 포스트 추가</button>
  </div>`;

  let heads = DAYS_KR.map(d => `<div class="cal-head">${d}</div>`).join('');
  let cells = '';
  if (isWeek) {
    const dow = today.getDay();
    const weekStart = new Date(today); weekStart.setDate(today.getDate() - dow);
    for (let i = 0; i < 7; i++) {
      const cd = new Date(weekStart); cd.setDate(weekStart.getDate() + i);
      const isToday = cd.toDateString() === today.toDateString();
      const dateStr = fmt(cd);
      const events = S.posts.filter(p => p.date === dateStr);
      cells += `<div class="cal-cell ${isToday?'today':''}" onclick="openPostModal('${dateStr}')"><div class="cal-day">${cd.getDate()}</div>${events.map(e => `<div class="cal-event acct-${e.account}" title="${esc(e.title)}">${esc(e.title)}</div>`).join('')}</div>`;
    }
  } else {
    const totalCells = Math.ceil((startDay + daysInMonth) / 7) * 7;
    for (let i = 0; i < totalCells; i++) {
      const dayNum = i - startDay + 1;
      const isOther = dayNum < 1 || dayNum > daysInMonth;
      const cd = new Date(y, mo, dayNum);
      const isToday = cd.toDateString() === today.toDateString();
      const dateStr = fmt(cd);
      const events = isOther ? [] : S.posts.filter(p => p.date === dateStr);
      cells += `<div class="cal-cell ${isOther?'other':''} ${isToday?'today':''}" onclick="${isOther?'':`openPostModal('${dateStr}')`}"><div class="cal-day">${isOther?'':dayNum}</div>${events.map(e => `<div class="cal-event acct-${e.account}" onclick="event.stopPropagation();editPost('${e.id}')" title="${esc(e.title)}">${esc(e.title)}</div>`).join('')}</div>`;
    }
  }
  return controls + `<div class="cal-grid ${isWeek?'week-view':''}">${heads}${cells}</div>`;
}

function calNav(dir) { S.calDate.setMonth(S.calDate.getMonth() + dir); renderMain(); }
function fmt(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-outline btn-sm" onclick="navSlide(-1)" ${S.activeSlide===0?'disabled':''}>← 이전</button>
      <button class="btn btn-outline btn-sm" onclick="navSlide(1)" ${S.activeSlide>=S.slides.length-1?'disabled':''}>다음 →</button>
    </div>`;

  return `<div class="carousel-workspace"><div class="carousel-sidebar">${sidebar}</div><div class="carousel-preview">${preview}</div><div class="carousel-editor">${editor}</div></div>`;
}

function navSlide(dir) { S.activeSlide = Math.max(0, Math.min(S.slides.length-1, S.activeSlide + dir)); renderMain(); }

function initCarouselEvents() {}

function setAlign(a) {
  S.slides[S.activeSlide].textAlign = a;
  save('slides', S.slides);
  renderMain();
}

function handleSlideMedia(input) {
  const file = input.files[0]; if (!file) return;
  const sl = S.slides[S.activeSlide];
  sl.mediaType = file.type.startsWith('video') ? 'video' : 'image';
  const reader = new FileReader();
  reader.onload = e => { sl.media = e.target.result; save('slides', S.slides); renderMain(); };
  reader.readAsDataURL(file);
}

function removeSlideMedia() {
  const sl = S.slides[S.activeSlide];
  sl.media = null; sl.mediaType = null;
  save('slides', S.slides); renderMain();
}

function updateSlide() {
  const sl = S.slides[S.activeSlide];
  sl.heading = document.getElementById('sl-heading').value;
  sl.body = document.getElementById('sl-body').value;
  sl.bg = document.getElementById('sl-bg').value;
  sl.textColor = document.getElementById('sl-tc').value;
  sl.fontSize = parseInt(document.getElementById('sl-fontsize').value) || 22;
  sl.fontFamily = document.getElementById('sl-font').value;
  const overlayEl = document.getElementById('sl-overlay');
  if (overlayEl) sl.overlay = parseFloat(overlayEl.value);
  save('slides', S.slides);
  // Live update canvas
  const canvas = document.getElementById('slideCanvas');
  if (canvas) {
    if (!sl.media) canvas.style.background = sl.bg;
    const h = canvas.querySelector('.slide-heading');
    const b = canvas.querySelector('.slide-body');
    if (h) { h.style.color = sl.textColor; h.textContent = sl.heading; h.style.fontSize = sl.fontSize+'px'; h.style.fontFamily = sl.fontFamily; h.style.textAlign = sl.textAlign; }
    if (b) { b.style.color = sl.textColor; b.innerHTML = esc(sl.body).replace(/\n/g,'<br>'); b.style.fontFamily = sl.fontFamily; b.style.textAlign = sl.textAlign; }
  }
}

function addSlide() {
  S.slides.push({ heading: `Slide ${S.slides.length+1}`, body: '', bg: '#0a0a0a', textColor: '#e8e8e8', fontSize: 22, fontFamily: 'sans-serif', textAlign: 'center', overlay: 0.5, media: null, mediaType: null });
  S.activeSlide = S.slides.length - 1; save('slides', S.slides); renderMain();
}

function duplicateSlide() {
  const src = S.slides[S.activeSlide];
  S.slides.splice(S.activeSlide + 1, 0, JSON.parse(JSON.stringify(src)));
  S.activeSlide++; save('slides', S.slides); renderMain();
}

function deleteSlide() {
  if (S.slides.length <= 1) return;
  S.slides.splice(S.activeSlide, 1);
  S.activeSlide = Math.min(S.activeSlide, S.slides.length - 1);
  save('slides', S.slides); renderMain();
}

function exportCarousel() {
  let html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;font-family:sans-serif}.slide{width:1080px;height:1350px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;page-break-after:always;box-sizing:border-box;position:relative;overflow:hidden;background-size:cover;background-position:center}.slide h1{font-size:64px;margin-bottom:32px;text-align:center;position:relative;z-index:2}.slide p{font-size:36px;text-align:center;line-height:1.6;position:relative;z-index:2}.slide .overlay{position:absolute;inset:0;z-index:1}@media print{.slide{page-break-after:always}}</style></head><body>';
  S.slides.forEach(s => {

    html += `<div class="slide" style="${bgStyle};color:${s.textColor};font-family:${s.fontFamily}">${s.media ? `<div class="overlay" style="background:rgba(0,0,0,${s.overlay||0.5})"></div>` : ''}<h1 style="text-align:${s.textAlign}">${esc(s.heading)}</h1><p style="text-align:${s.textAlign}">${esc(s.body).replace(/\n/g,'<br>')}</p></div>`;

function shareToInstagram() {
  // Export as downloadable images then open Instagram
  const canvas = document.createElement('canvas');
  canvas.width = 1080; canvas.height = 1350;
  const ctx = canvas.getContext('2d');

  async function exportSlides() {
    for (let i = 0; i < S.slides.length; i++) {
      const sl = S.slides[i];
      ctx.clearRect(0, 0, 1080, 1350);

      // Background
      if (sl.media && sl.mediaType === 'image') {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        await new Promise(r => { img.onload = r; img.src = sl.media; });
        const scale = Math.max(1080 / img.width, 1350 / img.height);
        const w = img.width * scale, h = img.height * scale;
        ctx.drawImage(img, (1080 - w)/2, (1350 - h)/2, w, h);
        ctx.fillStyle = `rgba(0,0,0,${sl.overlay||0.5})`;
        ctx.fillRect(0, 0, 1080, 1350);
      } else {
        ctx.fillStyle = sl.bg || '#0a0a0a';
        ctx.fillRect(0, 0, 1080, 1350);
      }

      // Text
      ctx.fillStyle = sl.textColor || '#e8e8e8';
      ctx.textAlign = sl.textAlign || 'center';
      const x = sl.textAlign === 'left' ? 80 : sl.textAlign === 'right' ? 1000 : 540;

      ctx.font = `700 ${(sl.fontSize||22) * 3}px ${sl.fontFamily || 'sans-serif'}`;
      wrapText(ctx, sl.heading || '', x, 500, 920, (sl.fontSize||22) * 3.5);

      ctx.font = `400 ${14 * 3}px ${sl.fontFamily || 'sans-serif'}`;
      wrapText(ctx, sl.body || '', x, 700, 920, 52);

      // Page number
      ctx.font = '30px sans-serif';
      ctx.fillStyle = '#666';
      ctx.textAlign = 'right';
      ctx.fillText(`${i+1} / ${S.slides.length}`, 1040, 1310);

      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `slide_${i+1}.png`;
        a.click();
      }, 'image/png');

      await new Promise(r => setTimeout(r, 300));
    }

    showModal(`
      <div class="modal-title">Instagram 공유 준비 완료</div>
      <p style="color:var(--text2);line-height:1.7;font-size:13px">
        ${S.slides.length}장의 슬라이드가 PNG로 다운로드되었습니다.<br><br>
        <strong>Instagram 업로드 방법:</strong><br>
        1. 다운로드된 이미지를 모바일로 전송 (AirDrop/카카오톡)<br>
        2. Instagram 앱에서 + 버튼 → 여러 장 선택<br>
        3. 순서대로 슬라이드 이미지 선택<br>
        4. 캡션 추가 후 공유<br><br>
        <em style="color:var(--gold)">💡 팁: AI 캡션 탭에서 캡션을 먼저 생성해두세요!</em>
      </p>
      <div class="modal-actions"><button class="btn btn-gold" onclick="closeModal()">확인</button></div>
    `);
  }

  exportSlides();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const lines = text.split('\n');
  let cy = y;
  for (const line of lines) {
    const words = line.split('');
    let current = '';
    for (const char of words) {
      const test = current + char;
      if (ctx.measureText(test).width > maxWidth && current) {
        ctx.fillText(current, x, cy);
        current = char; cy += lineHeight;
      } else { current = test; }
    }
    ctx.fillText(current, x, cy);
    cy += lineHeight;
  }
}

function parseEmailFromModal() {
  const text = document.getElementById('email-paste-area').value.trim();
  if (!text) return;
  closeModal();

  showParsedResult(parsed, text);
}

function handleEmailDrop(e) {
  const files = e.dataTransfer.files;
  if (files.length) {
    handleEmlFileObj(files[0]);
    return;
  }
  const text = e.dataTransfer.getData('text/plain') || e.dataTransfer.getData('text/html');
  if (text) {
    const parsed = parseEmailContent(text.replace(/<[^>]*>/g, ' ').replace(/&nbsp;/g, ' '));
    showParsedResult(parsed, text);
  }
}

function handleEmlFile(input) {
  if (input.files[0]) handleEmlFileObj(input.files[0]);
  input.value = '';
}

function handleEmlFileObj(file) {
  const reader = new FileReader();
  reader.onload = e => {
    let text = e.target.result;
    // Strip HTML tags if present
    text = text.replace(/<[^>]*>/g, ' ').replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ');
    // Decode quoted-printable if present
    text = text.replace(/=\r?\n/g, '').replace(/=([\dA-Fa-f]{2})/g, (_, h) => String.fromCharCode(parseInt(h, 16)));
    const parsed = parseEmailContent(text);
    showParsedResult(parsed, text);
  };
  reader.readAsText(file);
}

function parseEmailContent(text) {
  const result = {
    brand: '',
    sender: '',
    subject: '',
    value: '',
    deadline: '',
    deliverables: [],
    keyPoints: [],
    requirements: [],
    contact: '',
    rawText: text,
  };

  // Extract sender email
  const senderMatch = text.match(/(?:from|보내는\s*사람|발신|보낸\s*사람)\s*[:：]\s*([^\n<]+(?:<[^>]+>)?)/i);
  if (senderMatch) result.sender = senderMatch[1].trim();

  // Extract subject
  const subjectMatch = text.match(/(?:subject|제목|件名)\s*[:：]\s*([^\n]+)/i);
  if (subjectMatch) result.subject = subjectMatch[1].trim();

  // Extract brand name
  const brandPatterns = [
    /(?:브랜드|brand)\s*[:：]\s*([^\n,]+)/i,
    /(?:저희|당사)\s+([가-힣A-Za-z0-9\s&.]+?)(?:에서|는|이|가|의)/,
    /\[(?:광고|협업|제안|AD)\]\s*([^\]x×]+?)(?:\s*[x×]\s*)/i,
    /([A-Z][A-Za-z0-9&.\s]{1,20})\s*(?:x|×)\s*(?:크리스탈|Krystal)/i,
  ];
  for (const p of brandPatterns) {
    const m = text.match(p);
    if (m) { result.brand = m[1].trim(); break; }
  }
  // Fallback: try subject line
  if (!result.brand && result.subject) {
    const subBrand = result.subject.match(/(?:\[.*?\]\s*)?([^\[\]x×]+?)(?:\s*[x×]|\s*협업|\s*제안)/i);
    if (subBrand) result.brand = subBrand[1].replace(/[\[\]]/g, '').trim();
  }

  // Extract monetary value
  const valuePatterns = [
    /(?:금액|단가|비용|광고비|페이|fee|budget|price|cost)\s*[:：]?\s*(?:약\s*)?(?:₩|원|KRW)?\s*([\d,]+)\s*(?:만\s*원|만원)/i,
    /(?:금액|단가|비용|광고비|페이|fee|budget|price|cost)\s*[:：]?\s*(?:약\s*)?(?:₩|원|KRW)?\s*([\d,]+)\s*(?:원)/i,
    /([\d,]+)\s*(?:만\s*원|만원)/,
    /₩\s*([\d,]+)/,
  ];
  for (const p of valuePatterns) {
    const m = text.match(p);
    if (m) {
      let val = parseInt(m[0].includes('만') ? m[1].replace(/,/g, '') + '0000' : m[1].replace(/,/g, ''));
      result.value = val;
      break;
    }
  }

  // Extract dates/deadlines
  const datePatterns = [
    /(?:일정|마감|기한|deadline|날짜|업로드\s*(?:예정\s*)?일|게시\s*(?:예정\s*)?일|라이브\s*일)\s*[:：]?\s*([^\n]{5,40})/i,
    /(\d{4})\s*[년./-]\s*(\d{1,2})\s*[월./-]\s*(\d{1,2})\s*일?/,
    /(\d{1,2})\s*[월.]\s*(\d{1,2})\s*일?\s*(?:까지|이전|~|부터)/,
  ];
  for (const p of datePatterns) {
    const m = text.match(p);
    if (m) { result.deadline = m[0].trim().substring(0, 40); break; }
  }

  // Extract deliverables (콘텐츠 유형)
  const deliverableKeywords = ['피드','릴스','reels','스토리','story','유튜브','youtube','shorts','쇼츠','틱톡','tiktok','블로그','blog','라이브','live','영상','사진','포스팅','리뷰','언박싱','unboxing','브이로그','vlog'];
  deliverableKeywords.forEach(kw => {
    if (text.toLowerCase().includes(kw)) {
      const label = kw.charAt(0).toUpperCase() + kw.slice(1);
      if (!result.deliverables.includes(label)) result.deliverables.push(label);
    }
  });

  // Extract key selling points / requirements
  const keyPointPatterns = [
    /(?:소구\s*포인트|소구점|key\s*message|핵심\s*메시지|강조\s*포인트|필수\s*포함|must\s*include)\s*[:：]?\s*([^\n]+(?:\n[-•·*]\s*[^\n]+)*)/i,
    /(?:요청\s*사항|가이드|가이드라인|guideline|브리프|brief)\s*[:：]?\s*([^\n]+(?:\n[-•·*]\s*[^\n]+)*)/i,
  ];
  for (const p of keyPointPatterns) {
    const m = text.match(p);
    if (m) {
      const points = m[1].split(/\n|[-•·*]\s+/).map(s => s.trim()).filter(Boolean);
      result.keyPoints.push(...points);
    }
  }

  // Extract requirements / restrictions
  const reqPatterns = [
    /(?:필수\s*(?:사항|조건|포함)|주의\s*사항|제한|금지|restrictions?|requirements?)\s*[:：]?\s*([^\n]+(?:\n[-•·*]\s*[^\n]+)*)/i,
  ];
  for (const p of reqPatterns) {
    const m = text.match(p);
    if (m) {
      const reqs = m[1].split(/\n|[-•·*]\s+/).map(s => s.trim()).filter(Boolean);
      result.requirements.push(...reqs);
    }
  }

  // Extract contact info
  const contactMatch = text.match(/(?:담당자|연락처|contact|매니저|manager)\s*[:：]?\s*([^\n]+)/i);
  if (contactMatch) result.contact = contactMatch[1].trim();
  // Also try to find an email in the body
  const emailInBody = text.match(/[\w.-]+@[\w.-]+\.\w{2,}/);
  if (emailInBody && !result.contact) result.contact = emailInBody[0];

  return result;
}

function handleDealFile(input, type) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    window._dealFiles[type] = e.target.result;
    window._dealFiles[type + 'Name'] = file.name;
    const drop = input.previousElementSibling;
    drop.className = 'file-drop has-file';
    drop.textContent = `✅ ${file.name} (클릭하여 변경)`;
  };
  reader.readAsDataURL(file);
}

function saveDeal() {
  const deal = {
    id: 'd' + Date.now(),
    brand: document.getElementById('dl-brand').value.trim(),
    value: document.getElementById('dl-value').value,
    deadline: document.getElementById('dl-deadline').value,

  S.deals.push(deal); save('deals', S.deals);
  autoCrmFromDeal(deal);

function viewFile(dealId, type) {
  const d = S.deals.find(x => x.id === dealId);
  const file = type === 'contract' ? d.contractFile : d.briefFile;
  const name = type === 'contract' ? d.contractName : d.briefName;

  if (file.startsWith('data:image')) {

  const name = type === 'contract' ? d.contractName : d.briefName;

  a.href = file; a.download = name; a.click();

          클릭하여 영상 캡쳐 이미지 추가 (여러 장 가능)
        </div>
        <input type="file" id="ss-input" accept="image/*" multiple style="display:none" onchange="handleScreenshots(this)">
        <div class="screenshot-grid" id="ss-grid"></div>
      </div>
    </div>
    <div id="script-result"></div>
    ${saved}`;
}

function handleScreenshots(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      window._scriptScreenshots.push(e.target.result);
      renderScreenshotGrid();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderScreenshotGrid() {
  const grid = document.getElementById('ss-grid');
  if (!grid) return;
  grid.innerHTML = window._scriptScreenshots.map((src, i) =>
    `<div class="screenshot-item">
      <img src="${src}" alt="캡쳐 ${i+1}">
      <div class="remove-ss" onclick="removeScreenshot(${i})">✕</div>
    </div>`
  ).join('');
}

function removeScreenshot(i) {
  window._scriptScreenshots.splice(i, 1);
  renderScreenshotGrid();
}

function generateScript() {
  const topic = document.getElementById('sc-topic').value.trim();
  const type = document.getElementById('sc-type').value;
  const emotion = document.getElementById('sc-emotion').value;
  if (!topic) return;

  const hasScreenshots = window._scriptScreenshots.length > 0;

  const hooks = {

    '영감 Inspiration': [`${topic}이(가) 제 인생을 바꿨어요`,`${topic}에서 찾은 영감 한 조각`,`왜 ${topic}을(를) 시작해야 하는지`],
  };

  let body, ssAnalysis = '';
  if (hasScreenshots) {
    ssAnalysis = `\n\n📸 캡쳐 분석 기반 (${ssCount}장 참고):\n`;
    if (ssCount === 1) {
      body = `[캡쳐 1장 기반 분석]\n1. 오프닝 (0-3초): 캡쳐 속 핵심 비주얼과 동일한 앵글로 시작 — 시선 고정\n2. 컨텍스트 (3-8초): "${topic}" 관련 상황 설명, 자막 오버레이 활용\n3. 핵심 장면 (8-20초): 캡쳐 속 구도를 참고하여 메인 콘텐츠 전개\n4. 반전/클라이막스 (20-25초): 예상치 못한 디테일 또는 결과 공개\n5. 마무리 (25-30초): CTA와 함께 브랜딩 요소 노출`;
    } else if (ssCount <= 3) {
      body = `[캡쳐 ${ssCount}장 기반 시퀀스 분석]\n1. 인트로 씬 (캡쳐1 참고): 첫 장면의 구도와 분위기를 살려 훅 연출\n2. 전개 (캡쳐2 참고): ${topic} 관련 핵심 정보를 비주얼과 함께 전달\n${ssCount >= 3 ? `3. 클라이막스 (캡쳐3 참고): 하이라이트 장면 — 감정 최고조\n` : ''}4. 비하인드/개인 의견: 솔직한 리액션과 추천 포인트\n5. 아웃트로: 다음 콘텐츠 예고 + CTA`;
    } else {
      body = `[캡쳐 ${ssCount}장 기반 풀 스토리보드]\n1. 씬 1 — 오프닝 (캡쳐1): 강렬한 첫 인상, 훅과 동시 시작\n2. 씬 2 — 도입 (캡쳐2): ${topic} 배경 설명, 왜 이걸 다루는지\n3. 씬 3-${Math.min(ssCount-1, 5)} — 메인 (캡쳐3~${Math.min(ssCount-1, 5)}): 핵심 콘텐츠 전개\n   - 각 캡쳐의 구도와 전환 리듬 참고\n   - B-roll과 자막 교차 편집\n4. 씬 ${Math.min(ssCount, 6)} — 마무리 (캡쳐${ssCount}): 요약 + 감성적 마무리\n5. CTA 카드: 팔로우/구독/저장 유도`;
    }
    ssAnalysis += `→ ${ssCount}장의 캡쳐 화면에서 구도, 전환 흐름, 비주얼 패턴을 분석하여 구조를 생성했습니다.`;
    body += ssAnalysis;
  } else {
    const bodies = [
      `1. 배경 설명: ${topic}을(를) 시작하게 된 계기나 상황을 자연스럽게 설명\n2. 핵심 내용: 구체적인 정보, 경험, 또는 비하인드 공유\n3. 전환점: 놀라운 발견이나 깨달음의 순간\n4. 가치 전달: 시청자가 얻어갈 수 있는 인사이트`,
      `1. 현재 상황 소개: ${topic} 관련 최신 트렌드나 현장 분위기\n2. 디테일 공유: 감각적인 묘사와 구체적인 팁\n3. 개인적 의견: 솔직한 리뷰나 추천 포인트\n4. 비교/대조: 다른 옵션과의 차이점 또는 업그레이드된 점`,
    ];
    body = bodies[Math.floor(Math.random() * bodies.length)];
  }

  const ctas = [
    `"${topic} 관련 더 궁금한 거 있으면 댓글로 알려주세요! 팔로우하면 이런 콘텐츠 매일 볼 수 있어요 ✦"`,
    `"이 영상이 도움이 됐다면 저장하고 친구에게 공유해주세요! 다음에는 더 깊은 이야기 가져올게요 🤍"`,
    `"여러분의 ${topic} 경험도 궁금해요! 댓글로 공유해주세요. 좋아요는 큰 힘이 됩니다 ✦"`,
  ];

  const hook = (hooks[emotion] || hooks['궁금증 유발 Curiosity'])[Math.floor(Math.random() * 3)];
  const cta = ctas[Math.floor(Math.random() * ctas.length)];
  const script = { id: 's' + Date.now(), topic, type, emotion, hook, body, cta, date: fmt(new Date()), screenshots: [...window._scriptScreenshots] };

  document.getElementById('script-result').innerHTML = `
    <div class="card" style="margin-top:16px">
      <div class="card-header">
        <div>
          <div class="card-title">생성된 구조 — ${esc(type)}</div>
          ${hasScreenshots ? `<div class="section-sub" style="color:var(--success)">📸 캡쳐 ${ssCount}장 기반 분석 적용됨</div>` : ''}
        </div>
        <button class="btn btn-gold btn-sm" onclick="saveScript()">저장하기</button>
      </div>
      <div class="script-block"><div class="script-label">🎣 Hook 훅</div><div class="script-text">${esc(hook)}</div></div>
      <div class="script-block"><div class="script-label">📖 Body 본문</div><div class="script-text">${esc(body)}</div></div>
      <div class="script-block"><div class="script-label">🎯 CTA 콜투액션</div><div class="script-text">${esc(cta)}</div></div>
    </div>`;

  window._pendingScript = script;
}

function saveScript() {
  if (window._pendingScript) {
    S.scripts.unshift(window._pendingScript);
    save('scripts', S.scripts);
    autoThumbFromScript(window._pendingScript);
    window._pendingScript = null;
    window._scriptScreenshots = [];
    renderMain();
  }
}

function deleteScript(id) { S.scripts = S.scripts.filter(s => s.id !== id); save('scripts', S.scripts); renderMain(); }

// ─── Gmail Integration ───
function openGmail(to, subject, body) {
  const s = encodeURIComponent(subject);
  const b = encodeURIComponent(body);
  const t = encodeURIComponent(to);
  window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${t}&su=${s}&body=${b}&from=${encodeURIComponent(GMAIL)}`, '_blank');
}

function openGmailTemplate(templateKey, brand, toEmail) {
  const tpl = EMAIL_TEMPLATES[templateKey];
  if (!tpl) return;
  const subject = tpl.subject.replace(/\{\{brand\}\}/g, brand);
  const body = tpl.body.replace(/\{\{brand\}\}/g, brand);
  openGmail(toEmail || '', subject, body);
}

function openEmailComposer(brandName, toEmail, context) {
  const tplKeys = context === 'deal'
    ? ['deal_confirm', 'deal_delivery', 'followup']
    : ['outreach_kr', 'outreach_en', 'followup'];

  const tplButtons = tplKeys.map(k => {
    const tpl = EMAIL_TEMPLATES[k];
    return `<button class="btn btn-outline btn-sm" style="text-align:left;padding:10px 14px" onclick="openGmailTemplate('${k}','${esc(brandName)}','${esc(toEmail)}');logEmail('${esc(brandName)}','${k}');closeModal()">
      <div style="font-weight:600;margin-bottom:2px">${tpl.name}</div>
      <div style="font-size:10px;color:var(--text3)">${esc(tpl.subject.replace(/\{\{brand\}\}/g, brandName).substring(0,50))}...</div>
    </button>`;
  }).join('');

  showModal(`
    <div class="modal-title">📧 ${esc(brandName)} 이메일 보내기</div>
    <div class="gmail-bar">
      <span class="gmail-icon">📧</span>
      <span>From:</span>
      <span class="gmail-email">${GMAIL}</span>
    </div>
    <div class="form-group"><label>받는 사람</label><input id="email-to" value="${esc(toEmail || '')}" placeholder="이메일 주소..."></div>
    <div style="font-size:11px;color:var(--text3);letter-spacing:1px;margin-bottom:10px">템플릿 선택</div>
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">${tplButtons}</div>
    <div class="gold-line"></div>
    <div class="form-group"><label>직접 작성</label>
      <input id="email-subject" placeholder="제목..." style="margin-bottom:8px">
      <textarea id="email-body" rows="5" placeholder="내용..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-gold" onclick="sendCustomEmail('${esc(brandName)}')">Gmail에서 보내기</button>
    </div>
  `);
}

function sendCustomEmail(brand) {
  const to = document.getElementById('email-to').value.trim();
  const subject = document.getElementById('email-subject').value.trim();
  const body = document.getElementById('email-body').value.trim();
  if (!subject && !body) return;
  openGmail(to, subject, body);
  logEmail(brand, 'custom');
  closeModal();
}

function logEmail(brand, type) {
  const logs = JSON.parse(localStorage.getItem('ihq_email_logs') || '[]');
  logs.unshift({ brand, type, date: fmt(new Date()), time: new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'}) });
  if (logs.length > 200) logs.length = 200;
  localStorage.setItem('ihq_email_logs', JSON.stringify(logs));
  autoCrmStatusOnEmail(brand);
}

function getEmailLogs(brand) {
  const logs = JSON.parse(localStorage.getItem('ihq_email_logs') || '[]');
  return logs.filter(l => l.brand === brand);
}

function getEmailLogLabel(type) {
  const labels = { outreach_kr: '아웃리치', outreach_en: 'Outreach', followup: '팔로업', deal_confirm: '딜 확인', deal_delivery: '납품', custom: '직접 발송' };
  return labels[type] || type;
}

function getEmailLogClass(type) {
  if (type.includes('outreach')) return 'log-sent';
  if (type === 'followup') return 'log-follow';
  return 'log-reply';
}

function renderGmailBar() {
  const logs = JSON.parse(localStorage.getItem('ihq_email_logs') || '[]');
  return `<div class="gmail-bar">
    <span class="gmail-icon">📧</span>
    <span style="color:var(--text2)">Gmail 연동</span>
    <span class="gmail-email">${GMAIL}</span>
    <span class="gmail-status">● 연결됨 &middot; ${logs.length}건 발송</span>
  </div>`;
}

function renderCRM() {
  const statusGroups = { outreach: '연락 예정', contacted: '연락 완료', negotiating: '협상중', active: '협업중', completed: '완료' };

  const categoryLabels = { all: '전체 All', beauty: '뷰티 Beauty', fashion: '패션 Fashion', interior: '인테리어 Interior', other: '기타 Other' };

  const filtered = S.crmFilter === 'all' ? S.contacts : S.contacts.filter(c => c.category === S.crmFilter);

  let filters = `<div class="crm-filter">
    ${Object.entries(categoryLabels).map(([k, v]) =>
      `<button class="${S.crmFilter === k ? 'active' : ''}" onclick="S.crmFilter='${k}';renderMain()">${v} (${k === 'all' ? S.contacts.length : S.contacts.filter(c=>c.category===k).length})</button>`
    ).join('')}
  </div>`;

  let cards = filtered.length ? `<div class="grid-2">${filtered.map(c => {
    const emailLogs = getEmailLogs(c.brand);
    const hasEmail = c.contact && c.contact.includes('@');
    const lastLog = emailLogs.length ? emailLogs[0] : null;
    return `
    <div class="crm-card">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div style="display:flex;align-items:start;gap:8px">
          <input type="checkbox" class="batch-check" data-brand="${esc(c.brand)}" data-email="${esc(c.contact||'')}" ${S.crmSelected.includes(c.id)?'checked':''} onchange="toggleCrmSelect('${c.id}')">
          <div>
            ${c.category ? `<div class="crm-category">${categoryLabels[c.category] || c.category}</div>` : ''}
            <h3>${esc(c.brand)}</h3>
            <div class="crm-contact">${esc(c.contact || '연락처 없음')}</div>
          </div>
        </div>
        <span class="badge ${statusBadge[c.status]||'badge-neutral'}">${statusGroups[c.status]||c.status}</span>
      </div>
      ${c.platform ? `<div style="font-size:11px;color:var(--text3)">플랫폼: ${esc(c.platform)}</div>` : ''}
      ${lastLog ? `<div style="font-size:10px;color:var(--text3);margin-top:4px">📧 최근: ${lastLog.date} ${getEmailLogLabel(lastLog.type)}</div>` : ''}
      ${c.notes ? `<div class="crm-notes">${esc(c.notes)}</div>` : ''}
      ${emailLogs.length > 1 ? `<div class="email-log">${emailLogs.slice(0,3).map(l => `<div class="email-log-item"><span class="log-date">${l.date}</span><span class="log-type ${getEmailLogClass(l.type)}">${getEmailLogLabel(l.type)}</span><span>${l.time||''}</span></div>`).join('')}${emailLogs.length > 3 ? `<div style="font-size:9px;color:var(--text3)">+${emailLogs.length-3}건 더</div>` : ''}</div>` : ''}
      <div class="crm-actions">
        <button class="btn-gmail" onclick="openEmailComposer('${esc(c.brand)}','${esc(c.contact||'')}','crm')">📧 이메일</button>
        <button class="btn btn-outline btn-sm" onclick="editContact('${c.id}')">수정</button>
        <button class="btn btn-danger btn-sm" onclick="deleteContact('${c.id}')">삭제</button>
      </div>
    </div>`;
  }).join('')}</div>` : '<div class="empty"><div class="empty-icon">✦</div>해당 카테고리에 브랜드가 없습니다</div>';

  return `
    <div class="section-header">
      <div><div class="section-title">Brand Outreach CRM</div><div class="section-sub">브랜드 아웃리치 관리 — ${S.contacts.length}개 브랜드</div></div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="loadBrandDB()">DB 불러오기</button>
        <button class="btn btn-gold btn-sm" onclick="openContactModal()">+ 브랜드 추가</button>
      </div>
    </div>
    ${renderGmailBar()}
    ${S.crmSelected.length ? `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--gold-glow);border:1px solid var(--gold-dim);border-radius:8px;margin-bottom:12px">
      <span style="font-size:12px;color:var(--gold);font-weight:600">${S.crmSelected.length}개 선택됨</span>
      <button class="btn btn-gold btn-sm" onclick="batchOutreach()">📧 일괄 아웃리치</button>
      <button class="btn btn-outline btn-sm" onclick="S.crmSelected=[];renderMain()">선택 해제</button>
    </div>` : ''}
    ${filters}
    ${cards}`;
}

function loadBrandDB() {
  const existing = new Set(S.contacts.map(c => c.brand));
  let added = 0;
  BRAND_DB.forEach((b, i) => {
    if (!existing.has(b.brand)) {
      S.contacts.push({ ...b, id: 'c' + (Date.now() + i) });
      added++;
    }
  });
  if (added) { save('contacts', S.contacts); renderMain(); }
  showModal(`<div class="modal-title">브랜드 DB</div><p style="color:var(--text2);font-size:13px">${added ? `${added}개의 새 브랜드가 추가되었습니다.` : '이미 모든 브랜드가 등록되어 있습니다.'}</p><div class="modal-actions"><button class="btn btn-gold" onclick="closeModal()">확인</button></div>`);
}

    platform: document.getElementById('ct-platform').value.trim(),

function executeBatchOutreach(tplKey) {
  const selected = S.crmSelected.map(id => S.contacts.find(c => c.id === id)).filter(Boolean);
  closeModal();

  let opened = 0;
  selected.forEach((c, i) => {
    setTimeout(() => {
      openGmailTemplate(tplKey, c.brand, c.contact || '');
      logEmail(c.brand, tplKey);
      opened++;
      if (opened === selected.length) {
        S.crmSelected = [];
        showModal(`<div class="modal-title">일괄 발송 완료</div><p style="color:var(--text2);font-size:13px">${selected.length}개 브랜드에 Gmail 창이 열렸습니다.<br>각 창에서 내용 확인 후 발송해주세요.</p><div class="modal-actions"><button class="btn btn-gold" onclick="closeModal();renderMain()">확인</button></div>`);
      }
    }, i * 800); // Stagger to avoid popup blocking
  });
}

let _thumbBgImg = null;
let _thumbHitAreas = [];
let _dragLayer = null;
let _dragStartMouse = null;
let _dragStartPos = null;

function initThumbCanvas() {
  if (S.thumb.bgImage && !_thumbBgImg) {
    _thumbBgImg = new Image();
    _thumbBgImg.onload = () => drawThumb();
    _thumbBgImg.src = S.thumb.bgImage;
  } else {
    drawThumb();
  }
  // Attach drag events
  const canvas = document.getElementById('thumbCanvas');
  if (!canvas) return;
  canvas.style.cursor = 'default';
  canvas.onmousedown = thumbMouseDown;
  canvas.onmousemove = thumbMouseMove;
  canvas.onmouseup = thumbMouseUp;
  canvas.onmouseleave = thumbMouseUp;
  // Touch support
  canvas.ontouchstart = e => { e.preventDefault(); const touch = e.touches[0]; thumbMouseDown({ offsetX: touch.clientX - canvas.getBoundingClientRect().left, offsetY: touch.clientY - canvas.getBoundingClientRect().top }); };
  canvas.ontouchmove = e => { e.preventDefault(); const touch = e.touches[0]; thumbMouseMove({ offsetX: touch.clientX - canvas.getBoundingClientRect().left, offsetY: touch.clientY - canvas.getBoundingClientRect().top, buttons: 1 }); };
  canvas.ontouchend = thumbMouseUp;
}

function thumbMouseDown(e) {
  const mx = e.offsetX, my = e.offsetY;
  // Check hit areas in reverse (top layer first)
  for (let i = _thumbHitAreas.length - 1; i >= 0; i--) {
    const ha = _thumbHitAreas[i];
    const pad = 10;
    if (mx >= ha.x - pad && mx <= ha.x + ha.w + pad && my >= ha.y - pad && my <= ha.y + ha.h + pad) {
      _dragLayer = ha.layer;
      _dragStartMouse = { x: mx, y: my };
      _dragStartPos = { x: S.thumb[ha.xKey], y: S.thumb[ha.yKey] };
      const canvas = document.getElementById('thumbCanvas');
      if (canvas) canvas.style.cursor = 'grabbing';
      drawThumb(); // Show selection
      return;
    }
  }
  _dragLayer = null;
  drawThumb();
}

function thumbMouseMove(e) {
  const canvas = document.getElementById('thumbCanvas');
  if (!canvas) return;
  const mx = e.offsetX, my = e.offsetY;

  if (_dragLayer && _dragStartMouse && (e.buttons === 1 || e.buttons === undefined)) {
    const dx = mx - _dragStartMouse.x;
    const dy = my - _dragStartMouse.y;
    const ha = _thumbHitAreas.find(h => h.layer === _dragLayer);
    if (ha) {
      S.thumb[ha.xKey] = Math.max(5, Math.min(95, _dragStartPos.x + (dx / canvas.width) * 100));
      S.thumb[ha.yKey] = Math.max(5, Math.min(95, _dragStartPos.y + (dy / canvas.height) * 100));
      drawThumb();
    }
    return;
  }

  // Hover cursor
  let hovering = false;
  for (const ha of _thumbHitAreas) {
    const pad = 10;
    if (mx >= ha.x - pad && mx <= ha.x + ha.w + pad && my >= ha.y - pad && my <= ha.y + ha.h + pad) {
      hovering = true; break;
    }
  }
  canvas.style.cursor = hovering ? 'grab' : 'default';
}

function thumbMouseUp() {
  if (_dragLayer) {
    const canvas = document.getElementById('thumbCanvas');
    if (canvas) canvas.style.cursor = 'default';
    _dragLayer = null;
    _dragStartMouse = null;
    _dragStartPos = null;
    drawThumb();
  }
}

function _drawThumbToCtx(ctx, cw, ch, scale) {
  const t = S.thumb;

  // Background
  ctx.fillStyle = t.bg;
  ctx.fillRect(0, 0, cw, ch);

  // Background image
  if (_thumbBgImg && _thumbBgImg.complete && t.bgImage) {
    const imgScale = Math.max(cw / _thumbBgImg.width, ch / _thumbBgImg.height);
    const iw = _thumbBgImg.width * imgScale, ih = _thumbBgImg.height * imgScale;
    ctx.drawImage(_thumbBgImg, (cw - iw)/2, (ch - ih)/2, iw, ih);
  }

  // Dark overlay
  if (t.overlay > 0) {
    ctx.fillStyle = `rgba(0,0,0,${t.overlay})`;
    ctx.fillRect(0, 0, cw, ch);
  }

  // Bottom gradient (Krystal signature style)
  const gs = t.gradientStrength || 0.7;
  const grad = ctx.createLinearGradient(0, ch * 0.35, 0, ch);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.5, `rgba(0,0,0,${gs * 0.3})`);
  grad.addColorStop(1, `rgba(0,0,0,${gs})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);

  // Badge (top-left)
  if (t.badge) {
    const bfs = 13 * scale;
    ctx.font = `600 ${bfs}px ${FONT_CAPS}`;
    const bw = ctx.measureText(t.badge).width + 18 * scale;
    const bh = bfs + 12 * scale;
    const bx = 16 * scale, by = 16 * scale;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    roundRect(ctx, bx, by, bw, bh, 4 * scale); ctx.fill();
    ctx.fillStyle = t.badgeColor || '#ffffff';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(t.badge, bx + 9 * scale, by + bh/2);
  }

  // === 3-LAYER TEXT SYSTEM (draggable) ===
  // Ensure defaults exist
  if (t.scriptX === undefined) t.scriptX = 50;
  if (t.scriptY === undefined) t.scriptY = 55;
  if (t.capsX === undefined) t.capsX = 50;
  if (t.capsY === undefined) t.capsY = 62;
  if (t.krX === undefined) t.krX = 50;
  if (t.krY === undefined) t.krY = 72;

  // Reset hit areas
  _thumbHitAreas = [];

  ctx.textBaseline = 'middle';

  // Layer 1: Pinyon Script (English cursive)
  if (t.scriptText) {
    const sfs = t.scriptSize * scale;
    ctx.font = `400 ${sfs}px ${FONT_SCRIPT}`;
    ctx.textAlign = 'center';
    const sx = cw * (t.scriptX / 100);
    const sy = ch * (t.scriptY / 100);
    if (t.titleStroke) {
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 8 * scale;
      ctx.shadowOffsetX = 2 * scale;
      ctx.shadowOffsetY = 2 * scale;
    }
    ctx.fillStyle = t.titleColor;
    const scriptLines = wrapThumbText(ctx, t.scriptText, cw * 0.85);
    const scriptLineH = sfs * 1.1;
    let maxW = 0;
    scriptLines.forEach((line, i) => {
      ctx.fillText(line, sx, sy + i * scriptLineH);
      maxW = Math.max(maxW, ctx.measureText(line).width);
    });
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
    // Store hit area
    const totalH = scriptLines.length * scriptLineH;
    _thumbHitAreas.push({ layer: 'script', x: sx - maxW/2, y: sy - sfs/2, w: maxW, h: totalH, xKey: 'scriptX', yKey: 'scriptY' });
  }

  // Layer 2: English CAPS (spaced uppercase)
  if (t.capsText) {
    const cfs = t.capsSize * scale;
    ctx.font = `400 ${cfs}px ${FONT_CAPS}`;
    const capsCx = cw * (t.capsX / 100);
    const capsCy = ch * (t.capsY / 100);
    if (t.titleStroke) { ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 4 * scale; }
    ctx.fillStyle = t.capsColor || '#ffffff';
    const capsStr = t.capsText.toUpperCase();
    const spacing = 4 * scale;
    let totalW = 0;
    for (const c2 of capsStr) totalW += ctx.measureText(c2).width + spacing;
    totalW -= spacing;
    let cx2 = capsCx - totalW / 2;
    ctx.textAlign = 'left';
    for (const c2 of capsStr) {
      ctx.fillText(c2, cx2, capsCy);
      cx2 += ctx.measureText(c2).width + spacing;
    }
    ctx.textAlign = 'center';
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    _thumbHitAreas.push({ layer: 'caps', x: capsCx - totalW/2, y: capsCy - cfs/2, w: totalW, h: cfs * 1.2, xKey: 'capsX', yKey: 'capsY' });
  }

  // Layer 3: Korean subtitle (210 디딤명조)
  if (t.krText) {
    const kfs = t.krSize * scale;
    ctx.font = `400 ${kfs}px ${FONT_KR}`;
    ctx.textAlign = 'center';
    const kx = cw * (t.krX / 100);
    const ky = ch * (t.krY / 100);
    if (t.titleStroke) { ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 4 * scale; }
    ctx.fillStyle = t.krColor || '#ffffff';
    const krLines = wrapThumbText(ctx, t.krText, cw * 0.85);
    const krLineH = kfs * 1.4;
    let maxKW = 0;
    krLines.forEach((line, i) => {
      ctx.fillText(line, kx, ky + i * krLineH);
      maxKW = Math.max(maxKW, ctx.measureText(line).width);
    });
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    const totalKH = krLines.length * krLineH;
    _thumbHitAreas.push({ layer: 'kr', x: kx - maxKW/2, y: ky - kfs/2, w: maxKW, h: totalKH, xKey: 'krX', yKey: 'krY' });
  }

  // Draw selection border on active drag layer
  if (_dragLayer) {
    const ha = _thumbHitAreas.find(h => h.layer === _dragLayer);
    if (ha) {
      ctx.strokeStyle = 'rgba(196,162,101,0.7)';
      ctx.lineWidth = 1.5 * scale;
      ctx.setLineDash([4 * scale, 3 * scale]);
      ctx.strokeRect(ha.x - 4*scale, ha.y - 4*scale, ha.w + 8*scale, ha.h + 8*scale);
      ctx.setLineDash([]);
    }
  }

  // Watermark
  ctx.font = `${10 * scale}px ${FONT_CAPS}`;
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('@krystalha_', cw - 12 * scale, ch - 10 * scale);
}

function drawThumb() {
  const canvas = document.getElementById('thumbCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const t = S.thumb;
  const sz = THUMB_SIZES[t.size] || THUMB_SIZES.igstory;
  const maxH = window.innerHeight - 220;
  const scale = Math.min(380 / sz.w, maxH / sz.h);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  _drawThumbToCtx(ctx, canvas.width, canvas.height, scale);
}

function wrapThumbText(ctx, text, maxWidth) {
  const lines = [];
  let current = '';
  for (const char of text) {
    if (char === '\n') { lines.push(current); current = ''; continue; }
    const test = current + char;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = char;
    } else { current = test; }
  }
  if (current) lines.push(current);
  return lines;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function handleThumbBg(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    S.thumb.bgImage = e.target.result;
    _thumbBgImg = new Image();
    _thumbBgImg.onload = () => { drawThumb(); renderMain(); };
    _thumbBgImg.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function applyThumbTemplate(id) {
  const tpl = THUMB_TEMPLATES.find(t => t.id === id);
  if (!tpl) return;
  S.thumb.template = id;
  tpl.apply(S.thumb);
  renderMain();
}

function downloadThumb() {
  const t = S.thumb;
  const sz = THUMB_SIZES[t.size] || THUMB_SIZES.igstory;
  const canvas = document.createElement('canvas');
  canvas.width = sz.w; canvas.height = sz.h;
  const ctx = canvas.getContext('2d');
  _drawThumbToCtx(ctx, sz.w, sz.h, 1);
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `thumbnail_${t.size}_${Date.now()}.png`;
    a.click();
  }, 'image/png');
}

function saveThumb() {
  const canvas = document.getElementById('thumbCanvas');
  const preview = canvas.toDataURL('image/png');
  const name = S.thumb.title || `썸네일 ${S.thumbs.length + 1}`;
  S.thumbs.push({ name, preview, config: JSON.parse(JSON.stringify(S.thumb)), date: fmt(new Date()) });
  save('thumbs', S.thumbs);
  renderMain();
}

function deleteThumb(i) {
  S.thumbs.splice(i, 1);
  save('thumbs', S.thumbs);
  renderMain();
}

function resetThumb() {
  S.thumb = {
    size:'igstory', bg:'#1a1a1a', bgImage:null, overlay:0.15, gradientStrength:0.7,
    scriptText:'Tips from', capsText:'NEW YORK', krText:'뉴욕 예술경영에서 배운 현명한 소비 법',
    titleColor:'#ffffff', capsColor:'#ffffff', krColor:'#ffffff',
    scriptSize:72, capsSize:18, krSize:24,
    scriptX:50, scriptY:55, capsX:50, capsY:62, krX:50, krY:72,
    titleStroke:false, titleStrokeColor:'rgba(0,0,0,0.5)',
    badge:'', badgeColor:'#c4a265', badgeBg:'#000000',
    template:'krystal', accentColor:'#ffffff',
  };
  _thumbBgImg = null;
  _dragLayer = null;
  renderMain();
}

// ─── Modal ───
function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay'; overlay.id = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(overlay);
}
function closeModal() { const el = document.getElementById('modal-overlay'); if (el) el.remove(); }

// ─── Utility ───
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ─── Init ───
initBrandDB();
renderNav();
renderMain();
</script>
